<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEON ARCHIVE · AIGC PORTFOLIO</title>
    <style>
        :root {
            --ink: #05040a;
            --violet: #a970ff;
            --pink: #ff4eca;
            --cyan: #44efff;
            --line: rgba(157, 112, 255, .38);
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            min-height: 100vh;
            overflow: hidden;
            color: #f8f4ff;
            background: var(--ink);
            font-family: "Bahnschrift", "Arial Narrow", "Microsoft YaHei", sans-serif;
        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background:
                radial-gradient(circle at 50% 50%, #362054 0, transparent 38%),
                linear-gradient(90deg, transparent 49.8%, #ac83ff14 50%, transparent 50.2%),
                linear-gradient(#ac83ff10 1px, transparent 1px);
            background-size: auto, 52px 52px, 52px 52px;
        }
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: .16;
            mix-blend-mode: screen;
            background: repeating-linear-gradient(0deg, transparent 0 3px, #fff 4px);
        }
        .top {
            height: 105px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 clamp(20px, 5vw, 80px);
            position: relative;
            z-index: 2;
            border-bottom: 1px solid var(--line);
        }
        .logo {
            font-weight: 900;
            letter-spacing: .12em;
            font-size: 14px;
        }
        .logo b {
            color: var(--cyan);
            text-shadow: 0 0 12px var(--cyan);
        }
        .top-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .quick-link {
		display: inline-flex;
		align-items: center;
		justify-content: center;
		padding: 10px 16px;
		border: 1px solid rgba(169, 112, 255, 0.65);
		color: #e2d8ff;
		background: rgba(169, 112, 255, 0.08);
		font-size: 14px;
		font-weight: 700;
		letter-spacing: .08em;
		text-decoration: none;
		white-space: nowrap;
		transition: .2s;
		}
        .quick-link:hover {
		color: var(--cyan);
		border-color: var(--cyan);
		background: rgba(68, 239, 255, 0.1);
		box-shadow: 0 0 16px rgba(68, 239, 255, 0.35);
		text-shadow: 0 0 12px var(--cyan);
		transform: translateY(-1px);
		}
        .status {
            font-size: 10px;
            letter-spacing: .12em;
            color: #c6adff;
        }
        .status i {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            margin-right: 7px;
            background: #76ffae;
            box-shadow: 0 0 12px #76ffae;
        }
        main {
            height: calc(100vh - 105px);
            min-height: 560px;
            display: grid;
            grid-template-rows: 1fr auto 1fr;
            position: relative;
            z-index: 1;
        }
        .intro {
            align-self: end;
            padding: 0 clamp(20px, 5vw, 80px) 36px;
            display: flex;
            justify-content: space-between;
            align-items: end;
            gap: 24px;
        }
        h1 {
            margin: 0;
            font-size: clamp(42px, 7vw, 112px);
            line-height: .78;
            letter-spacing: -.08em;
            font-weight: 900;
            text-shadow: 0 0 42px #a970ff44;
        }
        h1 span {
            color: var(--cyan);
            -webkit-text-stroke: 1px #b98cff;
            text-shadow: 0 0 20px #44efff;
        }
        .intro p {
            margin: 0;
            max-width: 270px;
            color: #c8bed9;
            font-size: 12px;
            line-height: 1.7;
            letter-spacing: .08em;
        }
        .axis-wrap {
            position: relative;
            width: 100%;
            border-top: 1px solid #b58bff;
            border-bottom: 1px solid #b58bff;
            background: #0a0712c7;
            box-shadow: 0 0 35px #8f5dff32, inset 0 0 35px #8f5dff14;
            overflow: hidden;
        }
        .axis-wrap::before,
        .axis-wrap::after {
            content: "";
            position: absolute;
            top: 0;
            bottom: 0;
            z-index: 3;
            width: clamp(45px, 9vw, 140px);
            pointer-events: none;
        }
        .axis-wrap::before {
            left: 0;
            background: linear-gradient(90deg, #08050d, transparent);
        }
        .axis-wrap::after {
            right: 0;
            background: linear-gradient(-90deg, #08050d, transparent);
        }
        .axis-label {
            position: absolute;
            left: clamp(15px, 2.5vw, 38px);
            top: 12px;
            z-index: 4;
            color: #f9e9ff;
            font-size: 10px;
            letter-spacing: .2em;
            writing-mode: vertical-rl;
            text-shadow: 0 0 12px var(--pink);
        }
        .axis {
            height: 270px;
            display: flex;
            align-items: center;
            width: max-content;
            padding: 25px 0;
            animation: stream linear infinite;
            will-change: transform;
        }
        .axis-wrap:hover .axis {
            animation-play-state: paused;
        }
        @keyframes stream {
            from {
                transform: translateX(0);
            }
            to {
                transform: translateX(-50%);
            }
        }
        .track {
            display: flex;
            gap: 18px;
            padding-right: 18px;
        }
        .work {
            position: relative;
            flex: 0 0 320px;
            aspect-ratio: 16 / 9;
            border: 1px solid #a970ff77;
            overflow: hidden;
            background: #191126;
            cursor: default;
            box-shadow: inset 0 0 20px #c261ff25, 0 0 18px #a970ff20;
            transition: .25s;
        }
        .work:hover {
            border-color: var(--cyan);
            box-shadow: 0 0 28px #44efff77;
            transform: scale(1.03);
        }
        .work img,
        .work video {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            filter: saturate(.9) contrast(1.08);
        }
        .work .work-poster,
        .work .preview-video {
            position: absolute;
            inset: 0;
            transition: opacity .32s ease, transform .55s ease;
        }
        .work .work-poster {
            z-index: 0;
            opacity: 1;
        }
        .work .preview-video {
            z-index: 1;
            opacity: 0;
            background: #05040a;
        }
        .work.is-previewing .work-poster {
            opacity: 0;
            transform: scale(1.04);
        }
        .work.is-previewing .preview-video {
            opacity: 1;
        }
        .preview-badge {
            position: absolute;
            z-index: 4;
            top: 10px;
            right: 10px;
            padding: 5px 7px;
            border: 1px solid rgba(68, 239, 255, .55);
            color: var(--cyan);
            background: rgba(5, 4, 10, .72);
            font-size: 7px;
            font-weight: 800;
            letter-spacing: .14em;
            pointer-events: none;
            transition: .2s;
        }
        .work.is-previewing .preview-badge {
            color: #05040a;
            background: var(--cyan);
            box-shadow: 0 0 14px rgba(68, 239, 255, .45);
        }
        .work::after {
            content: "";
            position: absolute;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            background: linear-gradient(180deg, transparent 45%, #06030ccc);
        }
        .caption {
            position: absolute;
            z-index: 3;
            left: 13px;
            right: 13px;
            bottom: 12px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: .09em;
            text-shadow: 0 2px 4px #000;
        }
        .caption small {
            display: block;
            color: #b8b1c6;
            margin-bottom: 3px;
            font-size: 9px;
            letter-spacing: .15em;
        }
        .work.placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 70% 35%, #3a1a4a 0 2%, transparent 3%),
                linear-gradient(135deg, #1a0d2a, #4a1a3a 50%, #1a3a4a);
            color: #a088bb;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: .08em;
            text-shadow: 0 0 20px #00000088;
        }
        .work.placeholder .caption {
            bottom: 20px;
            text-align: center;
        }
        .bottom {
            align-self: start;
            display: flex;
            justify-content: space-between;
            align-items: end;
            padding: 34px clamp(20px, 5vw, 80px);
            gap: 25px;
        }
        .hint {
            color: #a9a1bb;
            font-size: 11px;
            letter-spacing: .09em;
        }
        .hint strong {
            color: var(--pink);
        }
        .counter {
            font-size: 10px;
            color: #bda9e9;
            letter-spacing: .12em;
            margin-top: 6px;
        }
        .music-player {
            position: fixed;
            right: clamp(16px, 3vw, 42px);
            bottom: clamp(16px, 3vw, 34px);
            z-index: 20;
            width: min(360px, calc(100vw - 32px));
            padding: 12px 14px;
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            gap: 10px 14px;
            border: 1px solid #a970ff88;
            background: rgba(8, 5, 15, .88);
            box-shadow: 0 0 28px #a970ff35, inset 0 0 22px #44efff0d;
            backdrop-filter: blur(14px);
        }
        .music-info { min-width: 0; }
        .music-kicker {
            color: var(--pink);
            font-size: 8px;
            font-weight: 800;
            letter-spacing: .18em;
        }
        .music-title {
            margin-top: 4px;
            overflow: hidden;
            color: #f7f2ff;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .08em;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .music-controls {
            display: flex;
            align-items: center;
            gap: 7px;
        }
        .music-button {
            width: 30px;
            height: 30px;
            padding: 0;
            display: grid;
            place-items: center;
            border: 1px solid #a970ff77;
            color: #efe7ff;
            background: #171022;
            cursor: pointer;
            transition: .2s;
        }
        .music-button:hover,
        .music-button:focus-visible {
            border-color: var(--cyan);
            color: var(--cyan);
            box-shadow: 0 0 14px #44efff55;
            outline: none;
        }
        .music-button.play {
            border-color: #44efffaa;
            color: var(--cyan);
        }
        .volume-wrap {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 9px;
            color: #a99cbd;
            font-size: 9px;
            letter-spacing: .08em;
        }
        .volume-slider {
            width: 100%;
            height: 3px;
            accent-color: var(--cyan);
            cursor: pointer;
        }
        .entry-cover {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: grid;
            place-items: center;
            overflow: hidden;
            background:
                radial-gradient(circle at 50% 46%, rgba(95, 43, 140, .62), transparent 35%),
                linear-gradient(135deg, #040309 0%, #0b0713 52%, #050710 100%);
            transition: opacity .7s ease, visibility .7s ease;
        }
        .entry-cover::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(90deg, transparent 49.8%, rgba(68, 239, 255, .08) 50%, transparent 50.2%),
                linear-gradient(rgba(169, 112, 255, .08) 1px, transparent 1px);
            background-size: 52px 52px;
            mask-image: radial-gradient(circle at center, #000 10%, transparent 72%);
            animation: cover-grid 8s linear infinite;
        }
        .entry-cover::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            opacity: .12;
            background: repeating-linear-gradient(0deg, transparent 0 3px, #fff 4px);
        }
        .entry-cover.is-leaving {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .entry-frame {
            position: relative;
            z-index: 1;
            width: min(760px, calc(100vw - 40px));
            padding: clamp(34px, 6vw, 72px);
            border: 1px solid rgba(169, 112, 255, .62);
            background: rgba(7, 4, 13, .6);
            box-shadow: 0 0 60px rgba(169, 112, 255, .22), inset 0 0 45px rgba(68, 239, 255, .05);
            text-align: center;
            backdrop-filter: blur(10px);
        }
        .entry-frame::before,
        .entry-frame::after {
            content: "";
            position: absolute;
            width: 54px;
            height: 54px;
            pointer-events: none;
        }
        .entry-frame::before {
            top: -1px;
            left: -1px;
            border-top: 2px solid var(--cyan);
            border-left: 2px solid var(--cyan);
            box-shadow: -5px -5px 18px rgba(68, 239, 255, .2);
        }
        .entry-frame::after {
            right: -1px;
            bottom: -1px;
            border-right: 2px solid var(--pink);
            border-bottom: 2px solid var(--pink);
            box-shadow: 5px 5px 18px rgba(255, 78, 202, .2);
        }
        .entry-code {
            color: #bda9e9;
            font-size: 10px;
            letter-spacing: .24em;
        }
        .entry-title {
            margin: 20px 0 8px;
            font-size: clamp(46px, 9vw, 104px);
            line-height: .86;
            letter-spacing: -.07em;
            font-weight: 900;
            text-shadow: 0 0 38px rgba(169, 112, 255, .42);
        }
        .entry-title span {
            display: block;
            margin-top: 16px;
            color: var(--cyan);
            font-size: .48em;
            letter-spacing: -.03em;
            -webkit-text-stroke: 1px #b98cff;
            text-shadow: 0 0 20px var(--cyan);
        }
        .entry-subtitle {
            margin: 24px auto 30px;
            color: #bdb2cd;
            font-size: 11px;
            letter-spacing: .16em;
        }
        .entry-button {
            min-width: 220px;
            padding: 14px 22px;
            border: 1px solid var(--cyan);
            color: var(--cyan);
            background: rgba(68, 239, 255, .06);
            font: inherit;
            font-size: 12px;
            font-weight: 800;
            letter-spacing: .16em;
            cursor: pointer;
            box-shadow: 0 0 22px rgba(68, 239, 255, .18);
            transition: .25s;
        }
        .entry-button:hover,
        .entry-button:focus-visible {
            color: #05040a;
            background: var(--cyan);
            box-shadow: 0 0 32px rgba(68, 239, 255, .55);
            outline: none;
            transform: translateY(-2px);
        }
        .entry-status {
            margin-top: 20px;
            color: #776c88;
            font-size: 8px;
            letter-spacing: .2em;
        }
        .entry-status i {
            display: inline-block;
            width: 6px;
            height: 6px;
            margin-right: 7px;
            border-radius: 50%;
            background: #76ffae;
            box-shadow: 0 0 10px #76ffae;
            animation: status-pulse 1.6s ease-in-out infinite;
        }
        @keyframes cover-grid {
            to { background-position: 52px 0, 0 52px; }
        }
        @keyframes status-pulse {
            50% { opacity: .35; }
        }
        @media (max-width: 650px) {
            body {
                overflow: auto;
            }
            .top {
                height: 70px;
            }
            .top-right {
                gap: 12px;
            }
            .quick-link {
                font-size: 9px;
            }
            .status {
                display: none;
            }
            main {
                height: calc(100svh - 70px);
                min-height: 600px;
            }
            .intro {
                padding-bottom: 25px;
                display: block;
            }
            .intro p {
                margin-top: 22px;
            }
            .axis {
                height: 190px;
            }
            .work {
                flex: 0 0 245px;
            }
            .bottom {
                padding-top: 26px;
                align-items: flex-start;
                flex-direction: column;
                gap: 12px;
            }
            .axis-label {
                display: none;
            }
            .music-player {
                right: 12px;
                bottom: 12px;
                width: calc(100vw - 24px);
            }
            .entry-frame {
                padding: 44px 22px;
            }
            .entry-button {
                width: 100%;
                min-width: 0;
            }
        }
    </style>
</head>
<body>
    <section class="entry-cover" id="entry-cover" aria-label="进入作品集">

            <a class="quick-link" href="https://icnarvq01wek.feishu.cn/wiki/Aj0MwpQMOi4JsokGJSTcjLZynpe?from=from_copylink" target="_blank" rel="noopener noreferrer">作品集 PPT ↗</a>
            <div class="status"><i></i>LIVE PORTFOLIO SYSTEM</div>

    <main>
        <section class="intro">

            <p>我的 AIGC 创意与未完成的想象。</p>

        <section class="axis-wrap" aria-label="作品滚动轴">

    <aside class="music-player" aria-label="背景音乐播放器">

        <div class="music-controls">
            <button class="music-button" id="previous-track" type="button" aria-label="上一首">&#9198;</button>

        </div>
        <audio id="background-music" preload="auto"></audio>

    <script>
        // ─── 作品数据 ──────────────────────────────────────────────
        const works = [		
		{

            video: 'videos/CJH.mp4',

        }, 
		{

        }, 
		{

        }, 
		{

            title: '龙之女王的复仇'
        }, 
		{
            url: 'assets/TVCPPMT.png',

            type: ' ',
            title: 'TVC泡泡玛特'
        }, 
		{
            url: 'assets/TVCBWCJ.png',
            video: 'videos/TVCBWCJ.mp4',
            type: ' ',
            title: 'TVC霸王茶姬'
        }
		];

        // ─── 背景音乐歌单 ─────────────────────────────────────────
        // 将 MP3 上传到仓库的 music 文件夹，并在这里修改文件名和显示名称。
        const playlist = [
            { title: '黄昏替他们说', src: 'music/黄昏替他们说.mp3' },
            { title: '携以晚风', src: 'music/携以晚风.mp3' }
        ];

        // ─── DOM 引用 ──────────────────────────────────────────────
        const axis = document.querySelector('#axis');
        const trackA = document.querySelector('#track-a');
        const trackB = document.querySelector('#track-b');
        const counter = document.querySelector('#counter');
        const audio = document.querySelector('#background-music');
        const musicTitle = document.querySelector('#music-title');
        const toggleMusic = document.querySelector('#toggle-music');
        const previousTrack = document.querySelector('#previous-track');
        const nextTrack = document.querySelector('#next-track');
        const musicVolume = document.querySelector('#music-volume');
        const volumeValue = document.querySelector('#volume-value');
        const entryCover = document.querySelector('#entry-cover');
        const enterPortfolio = document.querySelector('#enter-portfolio');

        let currentTrack = 0;

        function loadTrack(index, shouldPlay = false) {
            currentTrack = (index + playlist.length) % playlist.length;
            const track = playlist[currentTrack];
            audio.src = track.src;
            musicTitle.textContent = `${String(currentTrack + 1).padStart(2, '0')} / ${track.title}`;
            if (shouldPlay) playMusic();
        }

        async function playMusic() {
            try {
                await audio.play();
                toggleMusic.innerHTML = '&#10074;&#10074;';
                toggleMusic.setAttribute('aria-label', '暂停');
            } catch (error) {
                musicTitle.textContent = '音乐文件未找到，请检查 music 文件夹';
            }
        }

        function pauseMusic() {
            audio.pause();
            toggleMusic.innerHTML = '&#9654;';
            toggleMusic.setAttribute('aria-label', '播放');
        }

        toggleMusic.addEventListener('click', () => {
            if (audio.paused) playMusic();
            else pauseMusic();
        });

        previousTrack.addEventListener('click', () => loadTrack(currentTrack - 1, true));
        nextTrack.addEventListener('click', () => loadTrack(currentTrack + 1, true));
        audio.addEventListener('ended', () => loadTrack(currentTrack + 1, true));
        audio.addEventListener('error', () => {
            musicTitle.textContent = '音乐文件未找到，请检查 music 文件夹';
            pauseMusic();
        });

        musicVolume.addEventListener('input', () => {
            audio.volume = Number(musicVolume.value);
            volumeValue.textContent = `${Math.round(audio.volume * 100)}%`;
        });

        enterPortfolio.addEventListener('click', async () => {
            enterPortfolio.disabled = true;
            enterPortfolio.textContent = '正在进入…';
            await playMusic();
            entryCover.classList.add('is-leaving');
            window.setTimeout(() => entryCover.remove(), 750);
        });

        audio.volume = Number(musicVolume.value);
        loadTrack(0);

        // ─── 隐藏式速度控制（代码调整） ──────────────────────────
        const SCROLL_SPEED = 300; // 单位：秒，数值越大滚动越慢

        // ─── 创建作品卡片 ──────────────────────────────────────────
        function createCard(w) {
            const el = document.createElement('article');
            el.className = 'work';

            if (w.url) {
                const poster = document.createElement('img');
                poster.className = 'work-poster';
                poster.src = w.url;
                poster.alt = w.title || '作品封面';
                poster.onerror = () => {
                    el.classList.add('placeholder');
                    poster.remove();
                    const span = document.createElement('span');
                    span.textContent = '◈ 图片未加载';
                    span.style.cssText =
                        'font-size:14px;font-weight:700;color:#a088bb;letter-spacing:.1em;text-shadow:0 0 20px #000;';
                    el.prepend(span);
                };
                el.append(poster);

                if (w.video) {
                    const preview = document.createElement('video');
                    preview.className = 'preview-video';
                    preview.dataset.src = w.video;
                    preview.muted = true;
                    preview.loop = true;
                    preview.playsInline = true;
                    preview.preload = 'none';

                    const badge = document.createElement('span');
                    badge.className = 'preview-badge';
                    badge.textContent = 'HOVER / VIDEO';

                    let hovering = false;
                    el.addEventListener('mouseenter', async () => {
                        hovering = true;
                        el.classList.add('is-previewing');
                        if (!preview.src) preview.src = preview.dataset.src;
                        try {
                            await preview.play();
                            if (!hovering) preview.pause();
                        } catch (error) {
                            el.classList.remove('is-previewing');
                            badge.textContent = 'VIDEO 未加载';
                        }
                    });

                    el.addEventListener('mouseleave', () => {
                        hovering = false;
                        el.classList.remove('is-previewing');
                        preview.pause();
                        preview.currentTime = 0;
                    });

                    preview.addEventListener('error', () => {
                        el.classList.remove('is-previewing');
                        badge.textContent = 'VIDEO 未加载';
                    });

                    el.append(preview, badge);
                }
            } else {
                el.classList.add('placeholder');
                const span = document.createElement('span');
                span.textContent = '◈ 占位';
                span.style.cssText =
                    'font-size:14px;font-weight:700;color:#a088bb;letter-spacing:.1em;text-shadow:0 0 20px #000;';
                el.prepend(span);
            }

            const c = document.createElement('div');
            c.className = 'caption';
            c.innerHTML = `<small>${w.type || 'WORK'}</small>${w.title || '未命名'}`;
            el.append(c);
            return el;
        }

        // ─── 渲染滚动轴（确保无限连续） ──────────────────────────
        function render() {
            trackA.innerHTML = '';
            trackB.innerHTML = '';

            if (works.length === 0) {
                const emptyMsg = document.createElement('div');
                emptyMsg.style.cssText =
                    'color:#7a6a99;font-size:13px;letter-spacing:.1em;padding:20px 40px;';
                emptyMsg.textContent = '暂无作品';
                trackA.append(emptyMsg);
                trackB.append(emptyMsg.cloneNode(true));
                counter.textContent = '00 ARCHIVED WORKS';
                applySpeed();
                return;
            }

            const cardWidth = 320 + 18; // 卡片宽度 + gap
            // 关键：确保每个 track 宽度至少为视口宽度的 2.5 倍，彻底消除空白
            const trackMinWidth = window.innerWidth * 2.5;
            const neededCards = Math.ceil(trackMinWidth / cardWidth);
            // 至少复制 5 次，确保足够冗余
            const repeatCount = Math.max(5, Math.ceil(neededCards / works.length));

            for (let i = 0; i < repeatCount; i++) {
                works.forEach(w => {
                    trackA.append(createCard(w));
                    trackB.append(createCard(w));
                });
            }

            counter.textContent = String(works.length).padStart(2, '0') + ' ARCHIVED WORKS';
            applySpeed();
        }

        // ─── 应用动画速度 ──────────────────────────────────────────
        function applySpeed() {
            axis.style.animationDuration = SCROLL_SPEED + 's';
        }

        // ─── 窗口自适应（防抖） ──────────────────────────────────
        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(render, 300);
        });

        // ─── 键盘快捷键 R 键重新渲染 ────────────────────────────
        document.addEventListener('keydown', (e) => {
            if ((e.key === 'r' || e.key === 'R') && !e.ctrlKey && !e.metaKey) {
                e.preventDefault();
                render();
            }
        });

        // ─── 启动 ──────────────────────────────────────────────────
        render();

        // 控制台提示
        console.log('✦ NEON ARCHIVE 已启动 · 按 R 键重新渲染');
        console.log(`✦ 滚动速度: ${SCROLL_SPEED}s (修改 SCROLL_SPEED 变量调整)`);
        console.log('✦ 滚动轴已优化为无限连续滚动，不会出现空白');
    </script>
</body>
</html>
